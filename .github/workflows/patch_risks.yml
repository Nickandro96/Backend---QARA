name: patch_risks

on:
  workflow_dispatch:
    inputs:
      excel_path:
        description: "Path to Excel file in repo (ex: data/Questionnaires audits iso 9001.xlsx)"
        required: true
        default: "data/Questionnaires audits iso 9001.xlsx"
      referential_id:
        description: "Referential ID (1=MDR, 2=ISO9001, 3=ISO13485)"
        required: true
        default: "2"
      dry_run:
        description: "Dry-run (1=yes, 0=no)"
        required: true
        default: "1"
      force_overwrite:
        description: "Overwrite existing risk even if not null (1=yes, 0=no)"
        required: true
        default: "0"

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl mysql-connector-python

      - name: Patch risks from Excel
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python scripts/patch_risks_from_excel_generic.py \
            --excel "${{ inputs.excel_path }}" \
            --referential-id "${{ inputs.referential_id }}" \
            --dry-run "${{ inputs.dry_run }}" \
            --force-overwrite "${{ inputs.force_overwrite }}"
