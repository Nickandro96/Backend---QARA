name: export_iso_keys

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python

      - name: Export ISO question keys
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python scripts/export_question_keys.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iso_question_keys
          path: artifacts/iso_question_keys.csv
