name: Import FDA Questions Only

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "1 = dry-run (no DB write), 0 = real import"
        required: true
        default: "1"
  push:
    paths:
      - "data/Questionnaires audits FDA - tous les ref.xlsx"
      - ".github/workflows/import-fda-questions.yml"
      - "scripts/import-questionnaires.ts"

jobs:
  import_fda_questions:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      EXCEL_PATH: "data/Questionnaires audits FDA - tous les ref.xlsx"
      STRICT_FDA_FILE: "1"
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate FDA workbook exists
        run: |
          test -f "${EXCEL_PATH}" || (echo "Missing file: ${EXCEL_PATH}" && ls -la data && exit 1)

      - name: Apply SQL migrations
        run: pnpm exec tsx scripts/apply-sql-migrations.ts

      - name: Import FDA workbook only
        run: pnpm exec tsx scripts/import-questionnaires.ts

      - name: Upload import report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fda-import-report
          path: |
            import-report.json
